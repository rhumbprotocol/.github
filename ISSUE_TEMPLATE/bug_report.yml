name: Bug report
description: Report an error in the specification, schemas, templates, examples, or integrations.
title: "bug: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this for concrete defects. If the problem is a validator failure, use the validator failure template instead.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Protocol specification
        - JSON Schema
        - Template
        - Example/fixture
        - Integration adapter
        - Documentation/site
        - Governance/trademark
    validations:
      required: true
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
      description: What is wrong or inconsistent?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should the protocol, schema, template, or documentation say/do instead?
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Link files, line numbers, validator output, or screenshots.
      render: text
    validations:
      required: true
  - type: checkboxes
    id: contract
    attributes:
      label: Contract impact
      options:
        - label: This may change artifact shape, identifiers, lifecycle rules, statuses, or template names.
        - label: This may affect RWP™ compatibility.

