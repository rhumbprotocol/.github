name: Documentation issue
description: Improve docs, examples, diagrams, papers, or website copy.
title: "docs: "
labels: ["documentation", "triage"]
body:
  - type: input
    id: page
    attributes:
      label: Page or file
      placeholder: docs/PROTOCOL.md
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is unclear, stale, incorrect, or missing?
    validations:
      required: true
  - type: textarea
    id: correction
    attributes:
      label: Suggested correction
      description: If you know the fix, describe it. If not, describe the decision needed.
    validations:
      required: false

